<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لعبة النحو - أبو فيصل</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

<h1 class="welcome" id="welcome">أبو فيصل يرحب بكم ❤️</h1>

<div class="start-box">
  <input id="player" placeholder="اكتب اسمك">
  <select id="difficulty">
    <option value="">اختر مستوى الصعوبة</option>
    <option value="easy">سهل</option>
    <option value="medium">متوسط</option>
    <option value="hard">صعب</option>
  </select>
  <button onclick="startGame()">ابدأ اللعبة</button>
</div>

<div class="game-box" style="display:none;">
  <div class="top-bar">
    <div id="timer">5:00</div>
    <div id="progress">جملة 0 من 20</div>
  </div>

  <div id="sentence"></div>
  <input id="answer" placeholder="اكتب الإعراب هنا">

  <div class="buttons">
    <button onclick="checkAnswer()">تحقق</button>
    <button onclick="showFull()">إعراب الجملة كاملة</button>
  </div>

  <div id="feedback"></div>
  <div id="full"></div>

  <h2>الترتيب</h2>
  <div id="leaderboard"></div>
</div>

<audio id="correct-sound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="wrong-sound" src="https://actions.google.com/sounds/v1/cartoon/boing.ogg"></audio>

<script src="script.js"></script>
</body>
</html>
